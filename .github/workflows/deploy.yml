name: Refresh Update Manifests

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dreamapp-updates-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync latest default branch
        run: git pull --rebase origin "${{ github.event.repository.default_branch }}"

      - name: Build manifests
        env:
          PUBLIC_BASE_URL: https://updates.dreamapp.cc
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run build

      - name: Commit refreshed manifests
        run: |
          git add dist
          if git diff --cached --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi
          git commit -m "chore: refresh update manifests"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
